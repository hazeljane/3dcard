<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Card</title>

<link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Trad:wght@100..400&family=Poppins:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="lines.css">

<style>
/* 🔥 Tap to enable overlay */
#enableTilt {
	position: fixed;
	inset: 0;
	background: rgba(0,0,0,0.8);
	color: white;
	display: flex;
	justify-content: center;
	align-items: center;
	font-family: Poppins;
	z-index: 999;
	cursor: pointer;
}
</style>
</head>

<body>

<div id="enableTilt">Tap to Enable 3D Tilt</div>

<div class="container" id="card">
	<img src="me.png" alt="">
	<h1>I'm a <br> Frontend</h1>

	<div class="group">
		<span>❤</span>
		<p>For a programmer, curiosity is the key to growth and success.</p>
		<span>❤</span>
	</div>
</div>

<script>
const card = document.getElementById("card");
const overlay = document.getElementById("enableTilt");

// ===== STATE =====
let currentX = 0;
let currentY = 0;
let targetX = 0;
let targetY = 0;
let velocityX = 0;
let velocityY = 0;

const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// ===== LIGHT =====
function updateLight(px, py) {
	card.style.setProperty("--x", px + "%");
	card.style.setProperty("--y", py + "%");
}

// ===== DESKTOP =====
function handleMouseMove(e) {
	const rect = card.getBoundingClientRect();

	const x = (e.clientX - rect.left) / rect.width - 0.5;
	const y = (e.clientY - rect.top) / rect.height - 0.5;

	targetY = x * 16;
	targetX = y * -16;

	updateLight((x + 0.5) * 100, (y + 0.5) * 100);
}

// ===== MOBILE GYRO =====
function handleOrientation(e) {
	let x = e.beta;
	let y = e.gamma;

	if (x === null || y === null) return;

	x = Math.max(-30, Math.min(30, x));
	y = Math.max(-30, Math.min(30, y));

	targetX = x / 2;
	targetY = y / 2;

	updateLight(
		((y + 30) / 60) * 100,
		((x + 30) / 60) * 100
	);
}

// ===== ENABLE GYRO =====
function enableGyro() {
	if (
		typeof DeviceOrientationEvent !== "undefined" &&
		typeof DeviceOrientationEvent.requestPermission === "function"
	) {
		DeviceOrientationEvent.requestPermission()
			.then(res => {
				if (res === "granted") {
					window.addEventListener("deviceorientation", handleOrientation);
					overlay.style.display = "none";
				} else {
					overlay.innerText = "Permission denied ❌";
				}
			})
			.catch(() => {
				overlay.innerText = "Gyro not supported ❌";
			});
	} else {
		window.addEventListener("deviceorientation", handleOrientation);
		overlay.style.display = "none";
	}
}

// ===== INIT =====
if (isMobile) {
	overlay.addEventListener("click", enableGyro);
} else {
	overlay.style.display = "none";

	card.addEventListener("pointermove", handleMouseMove);

	card.addEventListener("pointerleave", () => {
		targetX = 0;
		targetY = 0;
		updateLight(50, 50);
	});
}

// ===== ANIMATION =====
function animate() {
	velocityX += (targetX - currentX) * 0.08;
	velocityY += (targetY - currentY) * 0.08;

	currentX += velocityX;
	currentY += velocityY;

	velocityX *= 0.85;
	velocityY *= 0.85;

	card.style.transform = `
		perspective(1000px)
		rotateX(${currentX}deg)
		rotateY(${currentY}deg)
		scale(1.05)
	`;

	requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
