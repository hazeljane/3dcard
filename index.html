<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Card</title>

<link href="https://fonts.googleapis.com/css2?family=Playwrite+US+Trad:wght@100..400&family=Poppins:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="lines.css">
</head>

<body>

<div class="container" id="card">
	<img src="me.png" alt="">
	<h1>I'm a <br> Frontend</h1>

	<div class="group">
		<span>❤</span>
		<p>For a programmer , curiosity is the key to growth and success.</p>
		<span>❤</span>
	</div>
</div>

<script>
const card = document.getElementById("card");

// ===== STATE =====
let currentX = 0;
let currentY = 0;

let targetX = 0;
let targetY = 0;

let velocityX = 0;
let velocityY = 0;

// Detect mobile
const isMobile = /Mobi|Android/i.test(navigator.userAgent);

// ===== LIGHT FOLLOW =====
function updateLight(px, py) {
	card.style.setProperty("--x", `${px}%`);
	card.style.setProperty("--y", `${py}%`);
}

// ===== DESKTOP (mouse tilt) =====
function handleMouseMove(e) {
	const rect = card.getBoundingClientRect();

	const x = (e.clientX - rect.left) / rect.width - 0.5;
	const y = (e.clientY - rect.top) / rect.height - 0.5;

	targetY = x * 16;
	targetX = y * -16;

	updateLight(
		(x + 0.5) * 100,
		(y + 0.5) * 100
	);
}

// ===== MOBILE (GYROSCOPE tilt) =====
function handleOrientation(e) {
	let x = e.beta;   // front/back
	let y = e.gamma;  // left/right

	// Clamp values (avoid crazy tilt)
	x = Math.max(-30, Math.min(30, x));
	y = Math.max(-30, Math.min(30, y));

	targetX = x / 2;
	targetY = y / 2;

	// Light follow
	const px = (y + 30) / 60 * 100;
	const py = (x + 30) / 60 * 100;

	updateLight(px, py);
}

// ===== ENABLE GYRO (for iPhone) =====
function enableGyro() {
	if (
		typeof DeviceOrientationEvent !== "undefined" &&
		typeof DeviceOrientationEvent.requestPermission === "function"
	) {
		// iOS
		DeviceOrientationEvent.requestPermission()
			.then(res => {
				if (res === "granted") {
					window.addEventListener("deviceorientation", handleOrientation);
				}
			})
			.catch(console.error);
	} else {
		// Android
		window.addEventListener("deviceorientation", handleOrientation);
	}
}

// ===== INIT =====
if (isMobile) {
	// Tap once to enable gyro (required on iOS)
	document.body.addEventListener("click", enableGyro, { once: true });
} else {
	card.addEventListener("pointermove", handleMouseMove);

	card.addEventListener("pointerleave", () => {
		targetX = 0;
		targetY = 0;
		updateLight(50, 50);
	});
}

// ===== ANIMATION =====
function animate() {
	velocityX += (targetX - currentX) * 0.08;
	velocityY += (targetY - currentY) * 0.08;

	currentX += velocityX;
	currentY += velocityY;

	velocityX *= 0.85;
	velocityY *= 0.85;

	card.style.transform = `
		perspective(1000px)
		rotateX(${currentX}deg)
		rotateY(${currentY}deg)
		scale(1.05)
	`;

	requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
